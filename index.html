<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>RAADS-R — Hétéro-questionnaire (usage soignant)</title>
<style>
:root{
  --bg:#f5f7f6; --surface:#ffffff; --surface-2:#fbfcfb;
  --ink:#3a403b; --ink-soft:#7c847d; --line:#e7ebe8;
  --accent:#86b6a0; --accent-d:#5e9580; --accent-soft:#e6f1ec;
  --warn:#c08a6a; --warn-soft:#f8efe7; --warn-line:#e6c8b1; --warn-ink:#8a5b3c;
  --navy:#2f4a6b; --navy-soft:#eaeff5;
  --lilac:#ebe4f4; --mint:#e2f0e8; --radius:14px; --maxw:880px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px;line-height:1.6;}
/* sticky bar */
.bar{position:sticky;top:0;z-index:30;background:rgba(251,252,251,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.bar-in{max-width:var(--maxw);margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.bar-in .ttl{font-size:12.5px;letter-spacing:.05em;color:var(--navy);font-weight:700;text-transform:uppercase;flex:1;min-width:160px;}
.bar-in .prog{font-size:13.5px;color:var(--ink-soft);font-weight:600;white-space:nowrap;}
.bar-in .prog b{color:var(--accent-d);}
.barbtn{font:inherit;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer;font-size:14.5px;}
.barbtn:hover{background:var(--accent-d);border-color:var(--accent-d);}
.barbtn.ghost{background:transparent;color:var(--accent-d);}
.barbtn.ghost:hover{background:var(--accent-soft);}
main{max-width:var(--maxw);margin:0 auto;padding:26px 22px 120px;}
.brandbanner{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin:0 0 22px;}
.brandbanner img{display:block;width:100%;height:auto;}
h1{font-size:28px;margin:0 0 8px;font-weight:650;letter-spacing:-.01em;color:var(--navy);}
h2{font-size:21px;margin:0 0 4px;font-weight:650;color:var(--navy);}
.lede{color:var(--ink-soft);margin:0 0 18px;font-size:17px;}
p{margin:0 0 12px;} .muted{color:var(--ink-soft);font-size:14px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin:0 0 18px;}
.note{background:var(--accent-soft);border-radius:12px;padding:14px 16px;color:#4a6a5c;font-size:14.5px;margin:0 0 18px;}
.note ul{margin:8px 0 0;padding-left:20px;} .note li{margin:3px 0;}
.field{margin:0 0 14px;} .field label{display:block;font-weight:600;margin:0 0 6px;font-size:15px;}
.field input{width:100%;font:inherit;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--surface);color:var(--ink);}
.field input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
.insn{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--ink-soft);font-size:15px;margin:0 0 18px;}
/* questions */
.q{padding:18px 0;border-top:1px solid var(--line);}
.q:first-of-type{border-top:none;}
.q.miss{background:var(--warn-soft);border-radius:12px;padding:18px 16px;margin:0 -16px;border-top:none;}
.qrow{display:flex;gap:11px;align-items:flex-start;margin:0 0 13px;}
.qn{flex:none;width:30px;height:30px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;}
.qx{flex:1;padding-top:3px;}
.cbtn{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:.12s;}
.cbtn:hover{background:var(--surface-2);border-color:var(--accent);color:var(--accent-d);}
.cbtn.has{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-d);}
.cbtn svg{width:17px;height:17px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-left:41px;}
.opt{display:flex;align-items:center;gap:12px;min-height:44px;padding:8px 15px;border:1px solid var(--line);border-radius:11px;background:var(--surface);cursor:pointer;transition:background .12s,border-color .12s;font-size:15.5px;position:relative;}
.opt:hover{background:var(--surface-2);}
.opt .dot{flex:none;width:20px;height:20px;border-radius:50%;border:2px solid #c6cdc7;transition:.12s;}
.opt.sel{background:var(--accent-soft);border-color:var(--accent);}
.opt.sel .dot{border-color:var(--accent-d);background:radial-gradient(circle at center,var(--accent-d) 0 6px,transparent 7px);}
.opt input{position:absolute;opacity:0;width:0;height:0;}
.opt:focus-within{outline:2px solid var(--accent);outline-offset:2px;}
.cinline{margin:10px 0 0 41px;}
.cinline textarea{width:100%;font:inherit;font-size:14.5px;min-height:64px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;resize:vertical;color:var(--ink);background:var(--surface-2);}
.cinline textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
.actions{display:flex;justify-content:flex-end;gap:12px;align-items:center;margin-top:24px;flex-wrap:wrap;}
button.btn{font:inherit;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;padding:12px 24px;border-radius:99px;cursor:pointer;transition:background .12s,border-color .12s;}
button.btn:hover{background:var(--accent-d);border-color:var(--accent-d);}
button.btn.ghost{background:transparent;color:var(--accent-d);}
button.btn.ghost:hover{background:var(--accent-soft);}
button.btn.danger{border-color:var(--warn-line);background:transparent;color:var(--warn-ink);}
button.btn.danger:hover{background:var(--warn-soft);}
button.btn:focus-visible{outline:2px solid var(--accent-d);outline-offset:2px;}
.cta-full{width:100%;justify-content:center;}
.banner{background:var(--warn-soft);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:12px;padding:13px 17px;margin:0 0 18px;font-size:15px;}
a{color:var(--accent-d);} .center{text-align:center;}
/* results */
.hdr-id{display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;font-size:15.5px;}
@media(max-width:560px){.hdr-id{grid-template-columns:1fr}}
.hdr-id .k{color:var(--ink-soft);}
.qcard h2 .mx{font-size:14px;color:var(--ink-soft);font-weight:500;}
.tot{display:flex;align-items:baseline;gap:10px;margin:8px 0 8px;}
.tot .big{font-size:40px;font-weight:700;letter-spacing:-.02em;}
.tot .max{color:var(--ink-soft);font-size:16px;}
.band{background:var(--accent-soft);border-radius:9px;padding:12px 16px;color:#3f6450;font-weight:650;margin:4px 0 6px;font-size:16px;}
.nrbox{background:var(--warn-soft);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:10px;padding:10px 14px;font-size:14.5px;margin:0 0 12px;}
.cmbox{background:var(--lilac);border-radius:10px;padding:10px 14px;font-size:14.5px;margin:0 0 12px;color:#4a4060;}
table{width:100%;border-collapse:collapse;font-size:15px;margin:8px 0;}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
th{color:var(--ink-soft);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;}
.subt td.flag{color:var(--accent-d);font-weight:700;}
.nr{color:var(--warn-ink);font-weight:700;}
.cmt{color:#5a5070;font-style:italic;}
details{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;}
summary{cursor:pointer;color:var(--accent-d);font-weight:600;font-size:14.5px;}
.interp{white-space:pre-wrap;font-size:14.5px;color:var(--ink-soft);margin-top:10px;line-height:1.55;}
/* modal */
.modal-back{position:fixed;inset:0;z-index:50;background:rgba(45,52,47,.34);display:flex;align-items:center;justify-content:center;padding:18px;}
.modal{background:var(--surface);border-radius:16px;max-width:460px;width:100%;padding:26px;box-shadow:0 18px 48px rgba(45,52,47,.22);}
.modal h2{margin:0 0 8px;} .modal p{color:var(--ink-soft);font-size:15.5px;}
.modal .mf{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:18px;}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media print{.bar,.no-print{display:none!important}main{padding:0}body{background:#fff}.card{break-inside:avoid;border-color:#ccc}details{display:block}details>summary{display:none}.interp,details table{display:block}}
</style></head><body>
<div class="bar"><div class="bar-in">
  <span class="ttl">DPL Les Makaras — RAADS-R (hétéro-questionnaire)</span>
  <span class="prog" id="prog"></span>
  <button class="barbtn" id="barAction"></button>
</div></div>
<main id="app"></main>
<script>
const RAADS = {"id": "RAADS", "title": "RAADS-R", "opts": ["Vrai maintenant et quand j'avais moins de 16 ans", "Vrai seulement maintenant", "Vrai seulement quand j'avais moins de 16 ans", "Jamais vrai"], "items": [{"n": 1, "text": "Je suis une personne compatissante", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 2, "text": "J'utilise souvent des mots et des phrases entendus dans des films ou à la télévision dans les conversations", "cat": "L", "scores": [3, 2, 1, 0]}, {"n": 3, "text": "Je suis souvent surpris lorsque les autres me disent que j'ai été impoli.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 4, "text": "Parfois, je parle trop fort ou trop doucement et je ne m'en aperçois pas.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 5, "text": "J'ai souvent des difficultés à savoir comment me comporter en société.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 6, "text": "Je peux \"me mettre dans la peau de quelqu'un d'autre\".", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 7, "text": "J'ai du mal à comprendre le sens de certaines phrases comme \"je tiens à toi comme à la prunelle de mes yeux\".", "cat": "L", "scores": [3, 2, 1, 0]}, {"n": 8, "text": "J'aime seulement parler aux gens qui partagent mes centres d'intérêt.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 9, "text": "Je fais plus attention aux détails qu'à l'idée générale.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 10, "text": "Je suis sensible à l'effet produit par un aliment dans ma bouche. Ceci est plus important que son goût.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 11, "text": "Mes meilleurs amis ou ma famille me manquent quand nous sommes séparés depuis longtemps.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 12, "text": "Quelquefois, je vexe les autres en disant ce que je pense, sans le faire exprès.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 13, "text": "J'aime seulement penser et parler des choses qui m'intéressent.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 14, "text": "Je préfère aller manger dans un restaurant tout seul plutôt qu'avec quelqu'un que je connais.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 15, "text": "Je n'arrive pas à imaginer comment ce serait d'être quelqu'un d'autre.", "cat": "L", "scores": [3, 2, 1, 0]}, {"n": 16, "text": "On m'a déjà dit que j'étais maladroit ou que je manquais de coordination.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 17, "text": "Les autres me trouvent étrange ou différent.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 18, "text": "Je comprends lorsque des amis ont besoin d'être réconfortés.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 19, "text": "Je suis très sensible au contact de mes vêtements lorsque je les touche. Leur texture est plus importante pour moi que leur look.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 20, "text": "J'aime copier la manière dont certaines personnes parlent et agissent. Cela m'aide à me sentir plus normal.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 21, "text": "Cela peut être très intimidant pour moi de parler à plus d'une personne en même temps.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 22, "text": "Je dois adopter un comportement \"normal\" pour plaire aux autres et pour qu'ils m'apprécient.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 23, "text": "Rencontrer de nouvelles personnes est habituellement facile pour moi.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 24, "text": "Je suis déstabilisé lorsque quelqu'un m'interrompt alors que je parle de quelque chose qui m'intéresse beaucoup.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 25, "text": "Il m'est difficile de percevoir les sentiments des autres lors d'une conversation.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 26, "text": "J'aime avoir une conversation avec plusieurs personnes, par exemple lors d'un dîner, à l'école ou au travail.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 27, "text": "Je prends les choses trop au premier degré, ainsi je passe à côté de ce que les gens essaient de me dire.", "cat": "L", "scores": [3, 2, 1, 0]}, {"n": 28, "text": "C'est très difficile pour moi de comprendre lorsque quelqu'un est gêné ou jaloux.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 29, "text": "Certaines textures ordinaires qui ne posent aucun problème aux autres sont pour moi insupportables lorsqu'elles sont au contact de ma peau.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 30, "text": "Je suis très contrarié lorsqu'on m'empêche de faire les choses à ma façon.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 31, "text": "Je n'ai jamais désiré ou eu besoin de ce que les autres personnes appellent une \"relation intime\".", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 32, "text": "C'est difficile pour moi de commencer et d'arrêter une conversation. J'ai besoin d'aller jusqu'au bout de mon propos.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 33, "text": "Je parle avec un rythme de voix normal.", "cat": "SM", "scores": [0, 1, 2, 3]}, {"n": 34, "text": "Je peux sans transition être très sensible ou pas du tout sensible au même son, à la même couleur ou à la même texture.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 35, "text": "La phrase \"je t'ai dans la peau\" me met mal à l'aise.", "cat": "L", "scores": [3, 2, 1, 0]}, {"n": 36, "text": "Quelquefois, la sonorité d'un mot ou un bruit aigu peut me faire mal aux oreilles.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 37, "text": "On me considère comme une personne très compréhensive.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 38, "text": "Je ne peux pas m'identifier à un personnage dans un film, et je ne peux pas ressentir ce qu'il ressent.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 39, "text": "Je ne peux pas dire si quelqu'un est en train de me draguer.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 40, "text": "Je peux me représenter avec précisions les détails qui m'intéressent.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 41, "text": "Je fais des listes de choses qui m'intéressent, même si elles n'ont pas d'utilité pratique (par exemple statistiques sportives, horaires de train, dates du calendrier, faits historiques, etc.)", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 42, "text": "Quand je me sens dépassé par des stimulations sensorielles, je dois m'isoler pour y échapper.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 43, "text": "J'aime parler de choses et d'autres avec mes amis.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 44, "text": "Je ne peux pas dire si quelqu'un est intéressé ou ennuyé par ce que je dis.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 45, "text": "Lorsque quelqu'un est en train de parler, il peut m'être très difficile de lire sur son visage, de comprendre les mouvements de ses mains ou de son corps.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 46, "text": "Je peux ressentir à différents moments la même chose très différemment (comme des vêtements ou la température).", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 47, "text": "Je me sens très à l'aise lors d'un rendez-vous amoureux ou lorsque je me trouve en société.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 48, "text": "J'essaie d'être aussi aidant que possible lorsque les autres me parlent de leurs problèmes personnels.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 49, "text": "On m'a dit que j'avais une voix particulière (par exemple plate, monotone, enfantine ou aigüe)", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 50, "text": "Quelquefois une idée ou un sujet reste bloqué dans mon esprit et je dois en parler, même si cela n'intéresse personne.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 51, "text": "Je fais certaines choses avec mes mains de façon répétée (comme un battement d'ailes, faire tournoyer un bâton ou une ficelle, agiter des choses devant mes yeux).", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 52, "text": "Je n'ai jamais été intéressé par ce que la plupart des gens que je connais considèrent comme intéressant.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 53, "text": "On me considère comme une personne compatissante.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 54, "text": "Pour m'entendre avec les autres, je suis un ensemble de règles spécifiques qui m'aident à paraître normal.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 55, "text": "C'est très difficile pour moi de travailler et d'évoluer dans un groupe.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 56, "text": "Lorsque je parle à quelqu'un, il m'est difficile de changer de sujet. Si l'autre personne le fait, je peux être bouleversé et confus.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 57, "text": "Quelquefois, je dois couvrir mes oreilles pour arrêter les bruits douloureux (comme un aspirateur ou des gens qui parlent trop ou trop fort).", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 58, "text": "Je peux discuter et avoir des conversations superficielles.", "cat": "L", "scores": [0, 1, 2, 3]}, {"n": 59, "text": "Quelquefois, des choses qui devraient être douloureuses ne me font pas mal (par exemple, lorsque je me blesse ou lorsque je me brûle la main sur un poêle).", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 60, "text": "Quand je parle à quelqu'un, j'ai des difficultés à savoir si c'est mon tour de parler ou d'écouter.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 61, "text": "Je suis considéré comme un solitaire par ceux qui me connaissent le mieux.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 62, "text": "Je parle habituellement avec un ton de voix normal.", "cat": "SM", "scores": [0, 1, 2, 3]}, {"n": 63, "text": "J'aime que les choses se déroulent toujours de la même manière, jour après jour, et même les petits changements dans mes routines me perturbent.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 64, "text": "Comment se faire des amis et s'intégrer socialement est un mystère pour moi.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 65, "text": "Cela me calme de tourner en rond ou de me balancer sur une chaise lorsque je me sens stressé.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 66, "text": "La phrase \" il a le cœur sur la main\" n'a pas de sens pour moi.", "cat": "L", "scores": [3, 2, 1, 0]}, {"n": 67, "text": "Si je suis dans un endroit où il y a beaucoup d'odeurs, de matières à toucher, de bruits ou de lumières intenses, je me sens anxieux ou effrayé.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 68, "text": "Je sais faire la différence lorsque quelqu'un dit une chose mais veut en dire une autre.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 69, "text": "J'aime être seul autant que possible.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 70, "text": "Je garde mes pensées empilées dans ma mémoire comme dans un classeur et je prends celles dont j'ai besoin en sélectionnant dans la pile (ou avec une méthode similaire).", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 71, "text": "Le même son peut paraître quelquefois très fort ou très doux alors que je sais qu'il n'a pas changé.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 72, "text": "J'aime passer du temps à manger et parler avec ma famille et mes amis.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 73, "text": "Je ne supporte pas les choses que je n'aime pas (comme des odeurs, des matières, des sons ou des couleurs).", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 74, "text": "Je n'aime pas être tenu ou étreint.", "cat": "SM", "scores": [3, 2, 1, 0]}, {"n": 75, "text": "Lorsque je vais quelque part, je dois suivre un parcours familier sinon je peux devenir très confus et perturbé.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 76, "text": "C'est difficile de comprendre ce que les autres personnes attendent de moi.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 77, "text": "J'aime avoir des amis proches.", "cat": "IS", "scores": [0, 1, 2, 3]}, {"n": 78, "text": "On me dit que je donne trop de détails.", "cat": "IR", "scores": [3, 2, 1, 0]}, {"n": 79, "text": "On me dit souvent que je pose des questions embarrassantes.", "cat": "IS", "scores": [3, 2, 1, 0]}, {"n": 80, "text": "J'ai tendance à souligner les erreurs des autres.", "cat": "IS", "scores": [3, 2, 1, 0]}]};

const Q = RAADS;
const N = Q.items.length;          // 80
const CFG = INTERP;            // RAADS interpretation config
const SUBLABEL = CFG.subscales;    // {L:[label,seuil,max],...}

let state = {
  view:"quest",
  id:{nom:"",prenom:"",naissance:"",dateJour:""},
  ans:new Array(N).fill(null),
  comments:new Array(N).fill("")
};

const app = document.getElementById('app');
const prog = document.getElementById('prog');
const barAction = document.getElementById('barAction');
function esc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function answered(){return state.ans.filter(v=>v!==null).length;}
function band(t){for(const b of CFG.bands){if(t>=b[0]&&t<=b[1])return b[2];}return '—';}

/* ---------- live progress + bar button ---------- */
function refreshBar(){
  if(state.view==="quest"){
    const a=answered();
    prog.textContent='';
    const b=document.createElement('b');b.textContent=a;
    prog.append(b, document.createTextNode(' / '+N+' réponses'));
    barAction.textContent='Valider les réponses';
    barAction.className='barbtn';
    barAction.style.display='';
  } else {
    prog.textContent='';
    barAction.textContent='← Modifier les réponses';
    barAction.className='barbtn ghost';
    barAction.style.display='';
  }
}
barAction.onclick=()=>{ if(state.view==="quest") trySubmit(); else { state.view="quest"; render(); } };

/* ---------- render dispatcher ---------- */
function render(){window.scrollTo(0,0); refreshBar();
  if(state.view==="quest") return renderQuest();
  return renderResults();
}

const CICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z"/></svg>';

/* ---------- questionnaire view ---------- */
function renderQuest(){
  let items='';
  Q.items.forEach((it,i)=>{
    let opts='';
    Q.opts.forEach((o,oi)=>{
      const sel=state.ans[i]===oi?' sel':'';
      opts+=`<label class="opt${sel}"><input type="radio" name="q_${i}" value="${oi}"${state.ans[i]===oi?' checked':''}><span class="dot"></span><span>${esc(o)}</span></label>`;
    });
    const has=state.comments[i]&&state.comments[i].trim()?' has':'';
    const open=state.comments[i]&&state.comments[i].trim();
    items+=`<div class="q" data-i="${i}">
      <div class="qrow"><div class="qn">${it.n}</div><div class="qx">${esc(it.text)}</div>
        <button type="button" class="cbtn${has}" data-ci="${i}" title="Note clinique (facultative)" aria-label="Note">${CICON}</button></div>
      <div class="opts">${opts}</div>
      <div class="cinline" data-cw="${i}" style="${open?'':'display:none'}">
        <textarea data-ct="${i}" placeholder="Note clinique sur cet item (facultatif)…">${esc(state.comments[i]||'')}</textarea>
      </div></div>`;
  });

  app.innerHTML=`<div class="brandbanner"><img src="${BANNER}" alt="Les Makaras — Centre Hospitalier Valvert · Hôpitaux de Provence"></div>
    <h1>RAADS-R — passation en hétéro-questionnaire</h1>
    <p class="lede">À renseigner par le soignant, item par item, avec le patient.</p>
    <div class="note">Page à usage interne. Tout est calculé localement dans votre navigateur — aucune donnée n'est envoyée. Les réponses ne sont pas enregistrées : ne fermez pas la page avant d'avoir relevé le résultat.</div>
    <div class="card">
      <h2>Identité du patient</h2>
      <p class="muted" style="margin-bottom:14px">Apparaîtra en tête de la cotation.</p>
      <div class="row2">
        <div class="field"><label for="nom">Nom</label><input id="nom" autocomplete="off" value="${esc(state.id.nom)}"></div>
        <div class="field"><label for="prenom">Prénom</label><input id="prenom" autocomplete="off" value="${esc(state.id.prenom)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label for="naissance">Date de naissance</label><input id="naissance" type="date" value="${esc(state.id.naissance)}"></div>
        <div class="field"><label for="dateJour">Date de passation</label><input id="dateJour" type="date" value="${esc(state.id.dateJour)}"></div>
      </div>
    </div>
    <div class="card">
      <h2>${esc(Q.title)}</h2>
      <div class="insn">Pour chaque affirmation, cochez la réponse qui correspond le mieux au patient. Une seule réponse par item. L'icône à droite de chaque item permet d'ajouter une note clinique facultative.</div>
      <div id="qlist">${items}</div>
      <div class="actions">
        <button class="btn ghost danger" id="reset">Réinitialiser</button>
        <button class="btn" id="submit">Valider les réponses</button>
      </div>
    </div>`;

  if(!state.id.dateJour){const t=new Date();state.id.dateJour=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');document.getElementById('dateJour').value=state.id.dateJour;}
  ['nom','prenom','naissance','dateJour'].forEach(k=>document.getElementById(k).addEventListener('input',e=>{state.id[k]=e.target.value;}));

  app.querySelectorAll('.opt input').forEach(inp=>inp.addEventListener('change',e=>{
    const cell=e.target.closest('.q');const i=+cell.dataset.i;state.ans[i]=+e.target.value;
    cell.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
    e.target.closest('.opt').classList.add('sel');cell.classList.remove('miss');
    refreshBar();
  }));
  app.querySelectorAll('.cbtn').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.ci;const w=app.querySelector('.cinline[data-cw="'+i+'"]');
    const show=w.style.display==='none';w.style.display=show?'':'none';
    if(show)w.querySelector('textarea').focus();
  });
  app.querySelectorAll('textarea[data-ct]').forEach(ta=>ta.addEventListener('input',e=>{
    const i=+e.target.dataset.ct;state.comments[i]=e.target.value;
    const btn=app.querySelector('.cbtn[data-ci="'+i+'"]');
    if(e.target.value.trim())btn.classList.add('has');else btn.classList.remove('has');
  }));
  document.getElementById('submit').onclick=trySubmit;
  document.getElementById('reset').onclick=confirmReset;
}

/* ---------- incomplete check + submit ---------- */
function missingNums(){const a=[];state.ans.forEach((v,i)=>{if(v===null)a.push(Q.items[i].n);});return a;}
function trySubmit(){
  const miss=missingNums();
  if(miss.length===0){state.view="results";render();return;}
  showModal(miss);
}
function showModal(miss){
  const back=document.createElement('div');back.className='modal-back';
  back.innerHTML=`<div class="modal" role="dialog" aria-modal="true">
    <h2>Réponses incomplètes</h2>
    <p>${miss.length} item(s) sans réponse. Vous pouvez revenir les compléter, ou afficher la cotation maintenant (les items sans réponse seront comptés 0).</p>
    <div class="mf"><button class="btn ghost" id="msee">Voir les items manquants</button><button class="btn" id="mgo">Coter quand même</button></div></div>`;
  document.body.appendChild(back);
  back.querySelector('#mgo').onclick=()=>{back.remove();state.view="results";render();};
  back.querySelector('#msee').onclick=()=>{
    back.remove();
    state.ans.forEach((v,i)=>{if(v===null){const c=app.querySelector('.q[data-i="'+i+'"]');if(c)c.classList.add('miss');}});
    showBanner('Items sans réponse surlignés ci-dessous : n° '+miss.join(', ')+'.');
    const f=app.querySelector('.q.miss');if(f)f.scrollIntoView({behavior:'smooth',block:'center'});
  };
  back.addEventListener('click',e=>{if(e.target===back)back.remove();});
}
function confirmReset(){
  const back=document.createElement('div');back.className='modal-back';
  back.innerHTML=`<div class="modal" role="dialog" aria-modal="true">
    <h2>Réinitialiser ?</h2>
    <p>Toutes les réponses, notes et informations saisies seront effacées. Cette action est irréversible.</p>
    <div class="mf"><button class="btn ghost" id="rno">Annuler</button><button class="btn danger" id="ryes">Tout effacer</button></div></div>`;
  document.body.appendChild(back);
  back.querySelector('#rno').onclick=()=>back.remove();
  back.querySelector('#ryes').onclick=()=>{back.remove();
    state={view:"quest",id:{nom:"",prenom:"",naissance:"",dateJour:""},ans:new Array(N).fill(null),comments:new Array(N).fill("")};
    render();};
  back.addEventListener('click',e=>{if(e.target===back)back.remove();});
}
function showBanner(msg){let b=document.getElementById('bn');
  if(!b){b=document.createElement('div');b.id='bn';b.className='banner';
    const host=app.querySelector('.card:last-child');host.insertBefore(b,host.firstChild);}
  b.textContent=msg;}

/* ---------- results / cotation view ---------- */
function renderResults(){
  const id=state.id;
  let total=0;const sub={};const nr=[];const comItems=[];
  Q.items.forEach((it,i)=>{
    const sel=state.ans[i];
    if(sel===null){nr.push(it.n);}
    else{const sc=it.scores[sel];total+=sc;if(it.cat)sub[it.cat]=(sub[it.cat]||0)+sc;}
    if(state.comments[i]&&state.comments[i].trim())comItems.push(it.n);
  });

  let html=`<div class="brandbanner"><img src="${BANNER}" alt="Les Makaras — Centre Hospitalier Valvert · Hôpitaux de Provence"></div>
    <div class="card"><h2>${esc(id.nom||'')} ${esc(id.prenom||'')}</h2>
      <div class="hdr-id">
        <div><span class="k">Date de naissance :</span> ${esc(id.naissance||'—')}</div>
        <div><span class="k">Date de passation :</span> ${esc(id.dateJour||'—')}</div>
        <div><span class="k">Mode :</span> Hétéro-questionnaire (soignant)</div>
      </div></div>`;

  html+=`<div class="card qcard"><h2>${esc(Q.title)} <span class="mx">/ ${CFG.totalMax}</span></h2>`;
  if(nr.length)html+=`<div class="nrbox"><strong>Items sans réponse</strong> (comptés 0 dans le score) : n° ${nr.join(', ')}.</div>`;
  if(comItems.length)html+=`<div class="cmbox"><strong>Notes du soignant</strong> : n° ${comItems.join(', ')} — voir le détail ci-dessous.</div>`;
  html+=`<div class="tot"><span class="big">${total}</span><span class="max">/ ${CFG.totalMax}</span></div>`;
  html+=`<div class="band">${esc(band(total))}</div>`;

  // subscales
  html+=`<table class="subt"><thead><tr><th>Sous-échelle</th><th>Score</th><th>Seuil</th><th>Max</th></tr></thead><tbody>`;
  for(const code in SUBLABEL){const [label,seuil,mx]=SUBLABEL[code];const v=sub[code]||0;
    const flag=(seuil!==null&&v>=seuil);
    html+=`<tr><td>${esc(label)} <span class="muted">(${code})</span></td><td class="${flag?'flag':''}">${v}${flag?' ≥ seuil':''}</td><td>${seuil===null?'—':seuil}</td><td>${mx===null?'—':mx}</td></tr>`;}
  html+=`</tbody></table>`;

  html+=`<details><summary>Repères d'interprétation</summary><div class="interp">${esc(CFG.details)}</div></details>`;
  html+=`<details><summary>Réponses détaillées</summary><table><thead><tr><th>#</th><th>Réponse</th><th>Pts</th><th>Note</th></tr></thead><tbody>`;
  Q.items.forEach((it,i)=>{const sel=state.ans[i];
    const lab=sel===null?'<span class="nr">NR</span>':esc(Q.opts[sel]);
    const sc=sel===null?'<span class="nr">0</span>':it.scores[sel];
    const cm=(state.comments[i]&&state.comments[i].trim())?`<span class="cmt">${esc(state.comments[i])}</span>`:'';
    html+=`<tr><td>${it.n}</td><td>${lab}</td><td>${sc}</td><td>${cm}</td></tr>`;});
  html+=`</tbody></table></details></div>`;

  html+=`<div class="no-print actions">
    <button class="btn ghost" id="back">← Modifier les réponses</button>
    <button class="btn" id="print">Imprimer / PDF</button>
  </div>`;

  app.innerHTML=html;
  document.getElementById('back').onclick=()=>{state.view="quest";render();};
  document.getElementById('print').onclick=()=>window.print();
}

render();
</script>
</body></html>
